name: zephyr_ui
description: 一套全面的、模块化的Flutter企业级UI组件库，提供高质量、易用的UI组件，加速Flutter应用的开发过程。
version: 0.1.0
homepage: https://github.com/agions/zephyr-ui
repository: https://github.com/agions/zephyr-ui

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 核心依赖
  provider: ^6.0.5      # 状态管理
  intl: ^0.19.0         # 国际化支持
  vector_graphics: ^1.1.7  # SVG图标支持
  collection: ^1.17.1   # 集合工具
  path: ^1.9.1         # 路径处理
  meta: ^1.9.1         # 元数据注解
  video_player: ^2.9.5
  
  # 文件上传相关
  image_picker: ^1.0.4  # 图片选择器
  
  # 富文本编辑器相关
  flutter_quill: ^10.8.4    # 富文本编辑器核心
  flutter_quill_extensions: ^10.8.4  # 富文本编辑器扩展
  url_launcher: ^6.2.5   # URL启动器

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.2  # 代码质量检查
  build_runner: ^2.4.6   # 代码生成
  mockito: ^5.4.2        # 测试模拟
  golden_toolkit: ^0.15.0 # 截图测试
  
  # 测试框架增强
  test: ^1.24.3          # 核心测试框架
  bloc_test: ^9.1.5      # BLoC状态管理测试
  mocktail: ^1.0.2       # 轻量级模拟库
  fake_async: ^1.3.1     # 异步测试工具
  
  # 代码覆盖率
  coverage: ^1.6.3       # 代码覆盖率工具
  
  # 性能测试
  benchmark_harness: ^2.2.2  # 性能基准测试
  flutter_driver:
    sdk: flutter           # 集成测试
  integration_test:
    sdk: flutter           # 集成测试增强
  
  # 文档生成
  dartdoc: ^8.3.2        # API文档生成

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: ZephyrIcons
      fonts:
        - asset: assets/fonts/ZephyrIcons.ttf 